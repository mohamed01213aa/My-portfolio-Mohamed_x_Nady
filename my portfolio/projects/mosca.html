<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOSCA Wear - Project Portfolio | Mohamed Nady</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: #3D0C11;
      color: rgba(255,255,255,0.9);
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Container ── */
    .container {
      max-width: 1200px; margin: 0 auto; padding: 0 24px;
      position: relative;
    }

    /* ── Typography ── */
    h1, h2, h3, h4 {
      font-family: 'Playfair Display', serif; font-weight: 700;
      color: rgba(255,255,255,0.93);
    }
    h2 {
      font-size: clamp(2rem, 5vw, 3rem);
      text-align: center; margin-bottom: 16px;
      letter-spacing: 0.5px;
    }
    .section-sub {
      text-align: center; font-weight: 300; font-size: 1.05rem;
      color: rgba(255,255,255,0.55); margin-bottom: 60px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 36px; border-radius: 50px;
      font-family: 'Inter', sans-serif; font-weight: 600;
      font-size: 0.95rem; letter-spacing: 0.3px;
      cursor: pointer; transition: all 0.35s ease;
      text-decoration: none; border: 2px solid transparent;
    }
    .btn-primary {
      background: #8B2635; color: #F5E6D3; border-color: #8B2635;
    }
    .btn-primary:hover {
      background: transparent; color: #F5E6D3; border-color: #F5E6D3;
      transform: translateY(-3px); box-shadow: 0 12px 28px rgba(139,38,53,0.35);
    }
    .btn-outline {
      background: transparent; color: #F5E6D3; border-color: rgba(245,230,211,0.4);
    }
    .btn-outline:hover {
      background: #8B2635; border-color: #8B2635;
      transform: translateY(-3px); box-shadow: 0 12px 28px rgba(139,38,53,0.3);
    }
    .btn-back {
      background: rgba(245,230,211,0.04);
      color: #F5E6D3;
      border: 1px solid rgba(245,230,211,0.08);
    }
    .btn-back:hover {
      background: rgba(139,38,53,0.15);
      border-color: rgba(139,38,53,0.3);
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(139,38,53,0.2);
    }

    /* ── Project Header ── */
    .project-header {
      text-align: center;
      padding: 80px 0 60px;
      background: linear-gradient(180deg, transparent 0%, rgba(139,38,53,0.1) 100%);
    }
    .project-logo {
      width: 120px; height: 120px;
      margin: 0 auto 24px;
      border-radius: 16px;
      object-fit: contain;
      border: 2px solid rgba(245,230,211,0.15);
    }
    .project-tag {
      display: inline-block;
      font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
      padding: 6px 16px; border-radius: 20px;
      background: rgba(139,38,53,0.2);
      border: 1px solid rgba(139,38,53,0.15);
      color: rgba(245,230,211,0.6);
      font-weight: 500;
      margin-bottom: 12px;
    }
    .project-title {
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      margin-bottom: 8px;
    }
    .project-industry {
      font-size: 1.1rem; color: rgba(245,230,211,0.5);
      font-weight: 300;
    }

    /* ── Project Content ── */
    .project-content {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      margin-bottom: 80px;
    }

    .project-section {
      background: rgba(245,230,211,0.03);
      border: 1px solid rgba(245,230,211,0.06);
      border-radius: 18px;
      overflow: hidden;
    }

    .section-header {
      padding: 24px 28px;
      border-bottom: 1px solid rgba(245,230,211,0.08);
    }
    .section-header h3 {
      font-family: 'Inter', sans-serif;
      font-size: 1rem; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(245,230,211,0.35);
      margin-bottom: 0; font-weight: 600;
    }

    .section-body {
      padding: 28px;
    }
    .section-body p {
      color: rgba(255,255,255,0.78);
      margin-bottom: 20px;
      font-size: 1.02rem;
      line-height: 1.8;
    }
    .section-body ul {
      list-style: none; padding: 0;
    }
    .section-body ul li {
      font-size: 0.95rem; color: rgba(245,230,211,0.65);
      padding-left: 20px; position: relative;
      line-height: 1.8; margin-bottom: 12px;
    }
    .section-body ul li::before {
      content: ""; position: absolute; left: 0; top: 10px;
      width: 6px; height: 6px; border-radius: 50%;
      background: #8B2635;
    }

    /* ── Stats Section ── */
    .stats-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      margin: 24px 0;
    }
    .stat-card {
      background: rgba(245,230,211,0.04);
      border: 1px solid rgba(245,230,211,0.06);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
    }
    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 700; color: #F5E6D3;
      display: block;
    }
    .stat-label {
      font-size: 0.85rem; color: rgba(245,230,211,0.4);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-top: 6px;
    }

    /* ── Social Links ── */
    .social-links-section {
      background: rgba(245,230,211,0.03);
      border: 1px solid rgba(245,230,211,0.06);
      border-radius: 18px;
      overflow: hidden;
    }
    .social-links {
      display: flex; flex-wrap: wrap; gap: 16px;
      padding: 24px; justify-content: center;
    }
    .social-link {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 24px; border-radius: 12px;

      border: 1px solid rgba(245,230,211,0.08);
      color: rgba(245,230,211,0.7);
